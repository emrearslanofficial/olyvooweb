name: Olyvoo Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4 # v4'e güncelledim

      - name: Node.js Kur
        uses: actions/setup-node@v4 # v4'e güncelledim
        with:
          node-version: 20

      - name: Build Al
        run: |
          npm install
          npm run build
        env:
          CI: false # Uyarılar build'i durdurmasın diye

      - name: AWS Kimlik Tanımla
        uses: aws-actions/configure-aws-credentials@v4 # v4'e güncelledim
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: S3'e Gönder
        run: |
          # ✅ BURAYI 'build/' YAPTIK (React projelerinde klasör budur)
          aws s3 sync build/ s3://olyvoo-landing --delete

      - name: CloudFront Önbelleğini Temizle
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"